      <rect x="217.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="217.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="217.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="372" y="217.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="237.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="237.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="237.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="372" y="237.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="257.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="257.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="257.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="372" y="257.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="277.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="277.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="277.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="372" y="277.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="297.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="297.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="297.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="372" y="297.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="317.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="317.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="317.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="372" y="317.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
  </g>

  <!-- 芯片主体 -->
  <g filter="url(#cardShadow)">
    
          <rect x="135" y="135" width="242" height="242" rx="24" fill="url(#chipGrad)" stroke="#ea580c" stroke-width="4" filter="" />
          <!-- 1脚定位标志 (Notch) -->
          <circle cx="160" cy="160" r="6" fill="#000000" opacity="0.5" />
          
    
    <!-- 内层硅片内核槽 (Die Well) -->
    <rect x="180" y="180" width="152" height="152" rx="12" fill="#04060a" stroke="#ea580c" stroke-width="1.5" opacity="0.95" />
    
    
          <!-- 极高精对称矢量战机 -->
          <g transform="translate(0, 0)">
            <polygon points="256,325 248,355 256,370 264,355" fill="#fb923c" opacity="0.6" />
            <path d="M 256,155 L 268,225 L 350,290 L 272,285 L 256,335 L 240,285 L 162,290 L 244,225 Z" fill="#fb923c" />
            <path d="M 256,175 L 264,225 L 315,270 L 270,265 L 256,320 L 242,265 L 197,270 L 248,225 Z" fill="#04060a" opacity="0.5" />
          </g>
    
      <!-- RYANWANG 左上角丝印：避开一脚标志(160, 160)并横向排布 -->
      <g opacity="0.85">
        <text x="182" y="158" font-family="Monaco, monospace, sans-serif" font-weight="900" font-size="12" fill="#fb923c" text-anchor="start" letter-spacing="1">
          RYANWANG
        </text>
      </g>
      
      <!-- 芯片型号丝印 -->
      <g opacity="0.45" font-family="monospace" font-size="8" fill="#fb923c" letter-spacing="1">
        <text x="182" y="170" text-anchor="start">HC32F460</text>
      </g>

      <!-- 芯片生产批次 -->
      <g opacity="0.3" font-family="monospace" font-size="8.5" fill="#fb923c" letter-spacing="2">
        <text x="256" y="348" text-anchor="middle">2620G</text>
      </g>
      
  </g>

  
      <!-- 芯片外框主网印文字 -->
      <text x="256" y="445" font-family="'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="28" fill="#fb923c" text-anchor="middle" letter-spacing="4">
        MCUPILOT
      </text>
      
</svg>