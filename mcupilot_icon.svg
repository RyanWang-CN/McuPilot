<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 芯片环氧树脂漫反射 -->
    <radialGradient id="chipGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- 高拟真镀金镜面渐变 (ENIG Gold) -->
    <linearGradient id="goldVisorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a3" />
      <stop offset="35%" stop-color="#fbbf24" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#8a5101" />
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#110c08" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <linearGradient id="helmetBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.8" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ea580c" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- FR-4 PCB板基层背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  
  <g stroke="#fb923c" stroke-width="0.5" opacity="0.1">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  
      <!-- 背景集成电路网 -->
      <path d="M 60,100 L 120,100 L 160,140" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.25" />
      <path d="M 452,100 L 392,100 L 352,140" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.25" />
      <path d="M 60,412 L 120,412 L 160,372" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.25" />
      <path d="M 452,412 L 392,412 L 352,372" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.25" />
      <circle cx="160" cy="140" r="3" fill="#fb923c" opacity="0.4" />
      <circle cx="352" cy="140" r="3" fill="#fb923c" opacity="0.4" />
      <circle cx="160" cy="372" r="3" fill="#fb923c" opacity="0.4" />
      <circle cx="352" cy="372" r="3" fill="#fb923c" opacity="0.4" />
      

  <!-- 外引脚与贴片 -->
  <g>
    <rect x="177.5" y="110" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="177.5" y="372" width="5" height="30" rx="1" fill="#fb923c" opacity="0.8" />
      <rect x="110" y="177.5" width="30" height="5" rx="1" fill="#fb923c" opacity="0.8" />
